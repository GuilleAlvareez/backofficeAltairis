services:
  db:
    image: postgres:16
    container_name: altairis_db
    environment:
      POSTGRES_DB: altairis
      POSTGRES_USER: altairis
      POSTGRES_PASSWORD: altairis123
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altairis"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: altairis_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: altairis
      DB_USER: altairis
      DB_PASS: altairis123
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: altairis_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data: